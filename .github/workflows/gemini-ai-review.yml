name: AI PR Review - Context7 & Gemini

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'simulations/**'
      - 'contracts/**'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Context7 Gemini Architecture Review
        run: echo "CodeRabbit AI PR Reviewer action is deprecated/removed. Mocking review."
