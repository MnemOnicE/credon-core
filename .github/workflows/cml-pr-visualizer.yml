name: Bolt PR Visualizer (CML)

on:
  pull_request:
    paths:
      - 'simulations/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libpixman-1-dev

      - name: Setup CML
        uses: iterative/setup-cml@v3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'


      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib seaborn

      - name: Run Sweeps
        run: python simulations/sweep.py

      - name: Create CML Report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Simulation Sweep Results" > report.md
          echo "Bolt has analyzed the latest simulation artifacts for this PR:" >> report.md

          cml publish docs/results/roi_vs_leverage.png --md >> report.md
          cml publish docs/results/trust_divergence.png --md >> report.md
          cml publish docs/results/circulating_supply_vs_rho.png --md >> report.md

          cml send-comment report.md
