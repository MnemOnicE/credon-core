name: Manual Mega-Audit
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  mega-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SonarCloud configuration
        run: |
          if [ ! -f sonar-project.properties ]; then
            echo "sonar.projectKey=mnemonice_credon-core" > sonar-project.properties
            echo "sonar.organization=mnemonice" >> sonar-project.properties
          fi

      - name: Run SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.report.export.path=sonar-report.sarif

      - name: Filter SARIF for Issues
        run: |
          REPORT_FILE="sonar-report.sarif"
          if [ ! -f "$REPORT_FILE" ]; then
            REPORT_FILE=$(find . -name "*.sarif" | head -n 1)
          fi

          if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
             jq '.runs[].results[] | select(.level == "error" or .level == "warning")' "$REPORT_FILE" > audit_payload.txt || echo "" > audit_payload.txt
          else
             echo "No SARIF report found." > audit_payload.txt
          fi

      - name: Dispatch Jules
        run: |
          if [ -s audit_payload.txt ] && [ "$(cat audit_payload.txt | wc -c)" -gt 30 ]; then
             jules new --repo . --prompt "You are responsible for creating the 'War Room' issue yourself. Your first action is to summarize the following audit payload into a structured GitHub Issue titled 'Mega-Audit: Critical Action Items' to act as the interface for Mnemo. The issue must categorize findings by domain (Security, Performance, Logic) and ask the user for prioritization before writing any code. Payload: $(cat audit_payload.txt)"
          else
             echo "No critical issues found or payload too small. Skipping Jules dispatch."
          fi
