name: Semantic Conflict Resolution
on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-synthesis:
    if: github.event.label.name == 'needs-ai-synthesis'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract Context and Identify Conflicts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          # Get files changed in this PR
          gh pr view $PR_NUMBER --json files --jq '.files[].path' > changed_files.txt

          echo "# Semantic Conflict Resolution Context" > synthesis_context.md
          echo "Current PR: $PR_NUMBER" >> synthesis_context.md
          echo "" >> synthesis_context.md

          # Iterate over other open PRs
          OPEN_PRS=$(gh pr list --state open --json number --jq '[.[] | select(.number != '"$PR_NUMBER"')] | .[].number')

          for other_pr in $OPEN_PRS; do
            # Get files changed in the other PR
            gh pr view $other_pr --json files --jq '.files[].path' > other_files.txt

            # Find overlapping files
            OVERLAP=$(comm -12 <(sort changed_files.txt) <(sort other_files.txt))

            if [ -n "$OVERLAP" ]; then
              echo "## Conflicts with PR #$other_pr" >> synthesis_context.md
              for file in $OVERLAP; do
                echo "### File: $file" >> synthesis_context.md
                echo "\`\`\`diff" >> synthesis_context.md
                gh pr diff $other_pr --color never | sed -n "/diff --git a\/$file/,/^diff/p" | head -n -1 >> synthesis_context.md
                echo "\`\`\`" >> synthesis_context.md
              done
            fi
          done

      - name: Dispatch Jules for Synthesis
        run: |
          jules new --repo . --prompt "Analyze the competing logic across all PRs provided in the context below and push a synthesized resolution commit to the current branch. Context: $(cat synthesis_context.md)"

      - name: Post-Synthesis Audit (SonarCloud)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.report.export.path=sonar-report-post.sarif

      - name: Verification Circuit Breaker
        run: |
          REPORT_FILE="sonar-report-post.sarif"
          if [ ! -f "$REPORT_FILE" ]; then
            REPORT_FILE=$(find . -name "*.sarif" | head -n 1)
          fi

          if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
             NEW_ERRORS=$(jq '[.runs[].results[] | select(.level == "error")] | length' "$REPORT_FILE")
             if [ "$NEW_ERRORS" -gt 0 ]; then
                echo "Verification Circuit Breaker Tripped! Found $NEW_ERRORS new errors."
                exit 1
             else
                echo "Verification Passed. No new errors detected."
             fi
          else
             echo "No SARIF report found for verification. Failing to be safe."
             exit 1
          fi
