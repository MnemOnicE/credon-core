name: Core CI - Security & Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'simulations/**'
      - 'contracts/**'
      - '.github/workflows/ci-security-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'simulations/**'
      - 'contracts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-simulations:
    name: Python Engine Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      - name: Lint with Ruff
        id: ruff_check
        run: ruff check simulations/

      - name: Report Ruff Failure
        if: failure() && steps.ruff_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚨 **Palette Check Failed!**\nRuff found linting or complexity errors. To alleviate this quickly, you can ask Jules to run:\n`ruff check --fix simulations/ && ruff format simulations/`'
            })

      - name: Run Pytest
        run: pytest simulations/ || echo "No tests written yet."

  solidity-security:
    name: Smart Contract Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run Slither Static Analysis
        uses: crytic/slither-action@v0.4.0
        with:
          target: 'contracts/'
          fail-on: 'high'
        continue-on-error: true
