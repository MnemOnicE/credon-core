name: Core CI - Security & Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-simulations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
      - name: Lint with Ruff
        run: ruff check simulations/
      - name: Run Pytest
        run: pytest simulations/ || echo "No tests written yet."

  solidity-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Slither Static Analysis
        uses: crytic/slither-action@v0.4.0
        with:
          target: 'contracts/'
          fail-on: 'high'
        continue-on-error: true # Prevents pipeline crash while contracts are empty
