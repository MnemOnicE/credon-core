name: Benchmarks & Experiments Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-benchmarks:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib seaborn numpy pytest

      - name: Run Core Tests First
        run: |
          PYTHONPATH=. pytest simulations/

      - name: Run Scientific Parameter Sweep (Lab Notebook)
        run: |
          PYTHONPATH=. python simulations/sweep.py

      - name: Run Performance Benchmarks
        run: |
          # PYTHONPATH=. python simulations/benchmark_trust.py
          # PYTHONPATH=. python simulations/benchmark_pagerank.py
          # PYTHONPATH=. python simulations/benchmark_cred.py
          # PYTHONPATH=. python simulations/benchmark_voting.py

      - name: Upload Experiment Logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: experiment-logs
          path: simulations/experiments/

      - name: Upload Simulation Results & Config
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: simulation-results
          path: |
            docs/results/
            deploy_config.json
