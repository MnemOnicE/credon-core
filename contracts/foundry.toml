[profile.default]
fs_permissions = [{ access = "read", path = "./deploy_config.json" }]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.27"
optimizer = true
optimizer_runs = 200

[fuzz]
runs = 1000

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "openzeppelin-contracts/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "@iden3/contracts/=lib/contracts/contracts/"
]
